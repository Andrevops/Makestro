<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c27f"/>
      <stop offset="100%" style="stop-color:#e2a04f"/>
    </linearGradient>
    <linearGradient id="gear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bg)"/>
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>

  <!-- Gear (build/make) — behind the baton -->
  <g transform="translate(64, 72)" opacity="0.85">
    <!-- Gear teeth -->
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(0)"/>
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(45)"/>
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(90)"/>
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(135)"/>
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(180)"/>
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(225)"/>
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(270)"/>
    <path d="M0,-28 L4,-28 L6,-24 L-6,-24 L-4,-28 Z" fill="url(#gear)" transform="rotate(315)"/>
    <!-- Gear body -->
    <circle cx="0" cy="0" r="22" fill="url(#gear)"/>
    <circle cx="0" cy="0" r="10" fill="url(#bg)"/>
  </g>

  <!-- Conductor baton — diagonal slash across the gear -->
  <g>
    <!-- Baton stick -->
    <line x1="38" y1="22" x2="92" y2="95" stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>
    <!-- Baton handle (grip) -->
    <ellipse cx="92" cy="95" rx="5" ry="7" transform="rotate(50, 92, 95)" fill="url(#gold)"/>
    <!-- Baton tip glow -->
    <circle cx="38" cy="22" r="5" fill="#e94560" opacity="0.8"/>
    <circle cx="38" cy="22" r="3" fill="#ff6b6b"/>
    <circle cx="38" cy="22" r="9" fill="#e94560" opacity="0.15"/>
  </g>

  <!-- Musical notes (floating) -->
  <g fill="url(#accent)" opacity="0.7">
    <!-- Note 1 -->
    <g transform="translate(24, 38)">
      <ellipse cx="0" cy="0" rx="4" ry="3" transform="rotate(-20)"/>
      <line x1="3.5" y1="-1" x2="3.5" y2="-14" stroke="url(#accent)" stroke-width="1.5"/>
      <path d="M3.5,-14 Q8,-12 7,-8" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    </g>
    <!-- Note 2 -->
    <g transform="translate(96, 38)">
      <ellipse cx="0" cy="0" rx="3.5" ry="2.5" transform="rotate(-20)"/>
      <line x1="3" y1="-1" x2="3" y2="-12" stroke="url(#accent)" stroke-width="1.5"/>
      <path d="M3,-12 Q7,-10 6,-7" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    </g>
  </g>

  <!-- Terminal cursor / prompt hint -->
  <g transform="translate(64, 105)" opacity="0.5">
    <text x="-8" y="0" font-family="monospace" font-size="12" fill="#e94560" font-weight="bold">$_</text>
  </g>
</svg>
